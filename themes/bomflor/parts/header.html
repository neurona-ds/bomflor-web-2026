        <i data-lucide="search" width="18" height="18"></i>
      </button>
      <button type="button" class="bf-search-overlay__close" aria-label="Cerrar búsqueda">
        <i data-lucide="x" width="20" height="20"></i>
      </button>
    </form>
  </div>
